services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: realtime_chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d realtime_chat"]
      interval: 2s
      timeout: 5s
      retries: 5

  server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "goose -dir /migrations postgres \"$$DB_URL\" up && exec server"]
    environment:
      DB_URL: postgres://chat:chat@postgres:5432/realtime_chat?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "8080:8080"

volumes:
  pgdata:
